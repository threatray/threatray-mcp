name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        run: |
          pip install uv build
          python -m build
          ls -la dist/

      - name: Upload built artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

      - name: Attest build provenance
        if: github.repository_visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes

  # Trusted-publishing to PyPI — runs only after the GH release exists, so
  # release notes are visible before the package goes live.
  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/threatray-mcp
    permissions:
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      # Publish the exact artifacts the build job produced, attested
      # (attest-build-provenance) and attached to the GH release — do NOT
      # rebuild here, so the SLSA provenance covers what actually lands on PyPI.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      # `uv publish` over `pypa/gh-action-pypi-publish`: that action is a Docker
      # action whose ghcr image is tagged by `github.action_ref`, so a
      # commit-SHA pin resolves to a non-existent image tag — incompatible with
      # the org "actions must be pinned to a full-length SHA" policy. uv has
      # built-in OIDC trusted publishing and setup-uv SHA-pins cleanly.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv publish --trusted-publishing always dist/*
